services:
  postgres:
    image: postgres:17
    container_name: gophkeeper-postgres
    environment:
      POSTGRES_DB: gophkeeper
      POSTGRES_USER: gophkeeper
      POSTGRES_PASSWORD: password
      PGPORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gophkeeper -d gophkeeper" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gophkeeper-network

  migrate:
    image: migrate/migrate
    container_name: gophkeeper-migrate
    volumes:
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "postgres://gophkeeper:password@postgres:5432/gophkeeper?sslmode=disable", "up" ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gophkeeper-network
    restart: on-failure

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gophkeeper-server
    environment:
      DATABASE_URI: "postgres://gophkeeper:password@postgres:5432/gophkeeper?sslmode=disable"
      GRPC_ADDRESS: "0.0.0.0:50051"
      LOG_LEVEL: "debug"
      JWT_SECRET_KEY: "dev-secret-key"
      JWT_EXPIRATION: "24h"
      TLS_CERT_PATH: "certs/server-cert.pem"
      TLS_KEY_PATH: "certs/server-key.pem"
      FILE_STORAGE_PATH: "storage/files/"
    ports:
      - "50051:50051"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - gophkeeper-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  gophkeeper-network:
    driver: bridge