services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gophkeeper
      POSTGRES_USER: gophkeeper
      POSTGRES_PASSWORD: password
      PGPORT: 5432
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gophkeeper -d gophkeeper" ]
      interval: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "postgres://gophkeeper:password@postgres:5432/gophkeeper?sslmode=disable", "up" ]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    environment:
      DATABASE_URI: "postgres://gophkeeper:password@postgres:5432/gophkeeper?sslmode=disable"
      RUN_ADDRESS: "0.0.0.0:8080"
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      - migrate