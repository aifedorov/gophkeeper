# Buf configuration for GophKeeper gRPC API
# For details on buf.yaml configuration, visit https://buf.build/docs/configuration/v2/buf-yaml
version: v2

# Modules define the proto files location
modules:
  - path: proto

# Lint configuration - uses standard linting rules
lint:
  use:
    - STANDARD

# Breaking change detection - checks for breaking changes at file level
breaking:
  use:
    - FILE
