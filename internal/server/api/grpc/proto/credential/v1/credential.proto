edition = "2023";

package credential.v1;

option go_package = "github.com/aifedorov/gen/credential/v1";

// CredentialService provides operations for managing user credentials.
// All operations require authentication via JWT token in metadata.
service CredentialService {
  // Create creates a new credential for the authenticated user.
  // Returns the ID of the newly created credential.
  // Returns AlreadyExists error if a credential with the same name already exists.
  // Returns InvalidArgument error if required fields are missing or invalid.
  rpc Create(CreateRequest) returns (CreateResponse);

  // List retrieves all credentials for the authenticated user.
  // Returns an empty list if the user has no credentials.
  rpc List(ListRequest) returns (ListResponse);

  // Update updates an existing credential for the authenticated user.
  // Returns NotFound error if the credential doesn't exist or doesn't belong to the user.
  // Returns InvalidArgument error if required fields are missing or invalid.
  rpc Update(UpdateRequest) returns (UpdateResponse);

  // Delete soft deletes a credential for the authenticated user.
  // Returns NotFound error if the credential doesn't exist or doesn't belong to the user.
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

// CreateRequest contains the data for creating a new credential.
message CreateRequest {
  // name is the unique identifier for the credential (e.g., "Gmail Account").
  // Required field, must not be empty.
  string name = 1;

  // login is the username or email associated with the credential.
  // Required field, must not be empty.
  string login = 2;

  // password is the plain text password that will be encrypted before storage.
  // Required field, must not be empty.
  string password = 3;

  // metadata contains optional additional information (e.g., notes, URLs).
  // This field is encrypted before storage.
  string notes = 4;
}

// CreateResponse contains the result of successful credential creation.
message CreateResponse {
  // id is the unique identifier assigned to the newly created credential.
  string id = 1;

  int64 version = 2;
}

// UpdateRequest contains the data for updating an existing credential.
message UpdateRequest {
  // id is the unique identifier of the credential to update.
  // Required field.
  string id = 1;

  // name is the new display name for the credential.
  // Required field, must not be empty.
  string name = 2;

  // login is the new username or email.
  // Required field, must not be empty.
  string login = 3;

  // password is the new plain text password that will be encrypted.
  // Required field, must not be empty.
  string password = 4;

  // metadata contains optional additional information.
  string notes = 5;

  int64 version = 6;
}

// UpdateResponse contains the result of credential update operation.
message UpdateResponse {
  // success indicates whether the update operation was successful.
  bool success = 1;

  int64 version = 2;
}

// DeleteRequest contains the identifier for deleting a credential.
message DeleteRequest {
  // id is the unique identifier of the credential to delete.
  string id = 1;
}

// DeleteResponse contains the result of credential deletion operation.
message DeleteResponse {
  // success indicates whether the deletion operation was successful.
  bool success = 1;
}

// ListRequest is empty as it retrieves all credentials for the authenticated user.
message ListRequest {}

// ListResponse contains all credentials belonging to the authenticated user.
message ListResponse {
  // ListItem represents a single credential in the list.
  message ListItem {
    // id is the unique identifier of the credential.
    string id = 1;

    // name is the credential's display name.
    string name = 2;

    // login is the decrypted username or email.
    string login = 3;

    // password is the decrypted password.
    string password = 4;

    // metadata contains decrypted additional information.
    string notes = 5;

    int64 version = 6;
  }

  // credentials is the list of all user's credentials.
  repeated ListItem credentials = 1;
}