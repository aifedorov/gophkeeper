edition = "2023";

package auth.v1;

option go_package = "github.com/aifedorov/gen/auth/v1";

// AuthService provides authentication operations for user registration and login.
service AuthService {
  // Register creates a new user account with the provided credentials.
  // Returns user ID and JWT access token upon successful registration.
  // Returns AlreadyExists error if the login is already taken.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  
  // Login authenticates an existing user with the provided credentials.
  // Returns user ID and JWT access token upon successful authentication.
  // Returns Unauthenticated error if credentials are invalid.
  rpc Login(LoginRequest) returns (LoginResponse);
}

// RegisterRequest contains the credentials for user registration.
message RegisterRequest {
  // login is the unique username for the new account.
  string login = 1;
  // password is the plain text password that will be hashed before storage.
  string password = 2;
}

// RegisterResponse contains the result of successful user registration.
message RegisterResponse {
  // access_token is the JWT token that can be used for authenticated requests.
  string access_token = 1;
  // encryption_key is the key used to encrypt the user's data.
  bytes encryption_key = 2;
  // user_id is the unique identifier for the user.
  string user_id = 3;
  // login is the unique identifier for the user.
  string login = 4;
}

// LoginRequest contains the credentials for user authentication.
message LoginRequest {
  // login is the username of the existing account.
  string login = 1;
  // password is the plain text password to verify against the stored hash.
  string password = 2;
}

// LoginResponse contains the result of successful user authentication.
message LoginResponse {
  // access_token is the JWT token that can be used for authenticated requests.
  string access_token = 1;
  // encryption_key is the key used to encrypt the user's data.
  bytes encryption_key = 2;
  // user_id is the unique identifier for the user.
  string user_id = 3;
  // login is the unique identifier for the user.
  string login = 4;
}
