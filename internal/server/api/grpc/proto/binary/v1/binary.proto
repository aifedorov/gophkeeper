edition = "2023";

package binary.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/aifedorov/gen/binary/v1";

service BinaryService {
  rpc Upload(stream UploadRequest) returns (UploadResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Download(DownloadRequest) returns (stream DownloadResponse);
  rpc Update(stream UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message UploadRequest {
  message Metadata {
    string name = 1;
    int64 size = 2;
    string notes = 3;
  }

  oneof data {
    Metadata file = 1;
    bytes chunk = 2;
  }
}

message UploadResponse {
  string file_id = 1;
  int64 version = 2;
}

message ListRequest {}

message ListResponse {
  message Metadata {
    string id = 1;
    string name = 2;
    int64 size = 3;
    string notes = 4;
    int64 version = 5;
    google.protobuf.Timestamp uploaded_at = 6;
  }

  repeated Metadata files = 1;
}

message DownloadRequest {
  string file_id = 1;
}

message DownloadResponse {
  message Metadata {
    string name = 1;
    int64 size = 2;
    string notes = 3;
    int64 version = 4;
  }

  oneof data {
    Metadata file = 1;
    bytes chunk = 2;
  }
}

message UpdateRequest {
  message Metadata {
    string file_id = 1;
    string name = 2;
    int64 size = 3;
    string notes = 4;
    int64 version = 5;
  }

  oneof data {
    Metadata file = 1;
    bytes chunk = 2;
  }
}

message UpdateResponse {
  bool success = 1;
  int64 version = 2;
}

message DeleteRequest {
  string file_id = 1;
}

message DeleteResponse {}