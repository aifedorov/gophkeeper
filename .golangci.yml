version: "2"

run:
  timeout: 3m

linters-settings:
  cyclop:
    max-complexity: 30
    package-average: 10.0

  errcheck:
    check-type-assertions: true

  exhaustive:
    check:
      - switch
      - map

  funlen:
    lines: 100
    statements: 50
    ignore-comments: true

  gocognit:
    min-complexity: 20

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-tags:
      - experimental
    settings:
      captLocal:
        paramsOnly: false
      underef:
        skipRecvDeref: false

  govet:
    enable-all: false
    enable:
      - assign
      - atomic
      - bools
      - buildir
      - cgocall
      - copylocks
      - errorsas
      - framepointer
      - httpresponse
      - ifaceassert
      - loopclosure
      - lostcancel
      - nilfunc
      - printf
      - shift
      - stdmethods
      - stringintconv
      - structtag
      - testinggoroutine
      - tests
      - unmarshal
      - unreachable
      - unsafeptr
      - unusedresult
    disable:
      - fieldalignment
      - shadow

linters:
  disable-all: true
  settings:
    staticcheck:
      checks:
        - all
        - "-ST1000"
  enable:
    # Core linters for basic code quality
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional stable linters
    - bodyclose
    - dupl
    - errname
    - errorlint
    - gosec
    - nilerr
    - noctx
    - unconvert

issues:
  # Maximum number of issues with the same text
  max-same-issues: 50

  # Using the new exclude-files syntax instead of skip-files
  exclude-files:
    - ".*\\.generated\\.go$"
    - ".*\\.pb\\.go$"

  # Exclude rules for specific cases
  exclude-rules:
    # Exclude specific patterns in test files
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst

    # Exclude specific error patterns
    - text: "SA1019:"
      linters:
        - staticcheck
    - text: "this value of .* is never used"
      linters:
        - staticcheck
    - text: "G107:"
      linters:
        - gosec

  # Exclude patterns for generated files
  exclude-patterns:
    - '.*\.generated\.go'
    - '.*\.pb\.go'
